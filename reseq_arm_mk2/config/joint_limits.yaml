# Joint limits for MoveIt planning and MoveIt Servo
# These override URDF limits with tighter velocity/acceleration bounds
# suitable for real hardware (Dynamixel servos on CAN bus).
joint_limits:
  mod1__base_pitch_arm_joint:
    has_velocity_limits: true
    max_velocity: 1.0       # rad/s (URDF: 2.0 - reduced for safety)
    has_acceleration_limits: true
    max_acceleration: 2.0    # rad/s^2
    has_position_limits: true
    min_position: -1.0      # widened: allow backward tilt
    max_position: 1.309

  mod1__base_roll_arm_joint:
    has_velocity_limits: true
    max_velocity: 1.0
    has_acceleration_limits: true
    max_acceleration: 2.0
    has_position_limits: true
    min_position: -3.14
    max_position: 3.14

  mod1__elbow_pitch_arm_joint:
    has_velocity_limits: true
    max_velocity: 1.0
    has_acceleration_limits: true
    max_acceleration: 2.0
    has_position_limits: true
    min_position: -1.0      # widened: allow elbow to straighten fully
    max_position: 2.88

  mod1__forearm_roll_arm_joint:
    has_velocity_limits: true
    max_velocity: 0.8
    has_acceleration_limits: true
    max_acceleration: 1.5
    has_position_limits: true
    min_position: -3.14
    max_position: 3.14

  mod1__wrist_pitch_arm_joint:
    has_velocity_limits: true
    max_velocity: 0.8
    has_acceleration_limits: true
    max_acceleration: 1.5
    has_position_limits: true
    min_position: -1.57     # widened: symmetrical range
    max_position: 1.57

  mod1__wrist_roll_arm_joint:
    has_velocity_limits: true
    max_velocity: 0.8
    has_acceleration_limits: true
    max_acceleration: 1.5
    has_position_limits: true
    min_position: -3.14
    max_position: 3.14
