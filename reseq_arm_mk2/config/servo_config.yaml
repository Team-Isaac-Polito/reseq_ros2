moveit_servo_node:
  ros__parameters:
    moveit_servo:
      # From: https://github.com/moveit/moveit2/blob/main/moveit_ros/moveit_servo/config/servo_parameters.yaml

      ## --- General Settings ---
      use_gazebo: false                           # TODO: Set conditionally to true if running in Gazebo
      is_primary_planning_scene_monitor: false
      publish_period: 0.1                         # 10Hz — 100ms trajectory segments for smooth interpolation
      incoming_command_timeout: 0.5               # seconds before Servo halts (remote sends at 12.5Hz/80ms)
      num_outgoing_halt_msgs_to_publish: 4        # number of halt messages on timeout
      low_latency_mode: false                     # timer-driven output (smoother than event-driven)

      ## --- Command Settings ---
      command_in_type: "unitless"
      command_out_type: trajectory_msgs/JointTrajectory
      command_out_topic: /mk2_arm_controller/joint_trajectory

      publish_joint_positions: true
      publish_joint_velocities: true
      publish_joint_accelerations: false

      ## --- Smoothing Settings ---
      use_smoothing: true
      smoothing_filter_plugin_name: "online_signal_smoothing::ButterworthFilterPlugin"

      ## --- Robot-Frames and Groups ---
      move_group_name: mk2_arm
      planning_frame: arm_base_link
      ee_frame_name: arm_roll_wrist_link
      robot_link_command_frame: arm_base_link

      ## --- Singularity Avoidance Settings ---
      # Effectively disabled per team docs — small arm singularity avoidance is too aggressive
      lower_singularity_threshold: 1.0e17
      hard_stop_singularity_threshold: 1.0e20
      leaving_singularity_threshold_multiplier: 3.0

      ## --- Joint Limit Margins ---
      # Disabled (0.0) — Multi-turn position normalization in the hardware
      # interface prevents out-of-range values. Dynamixel servos enforce
      # their own hardware position limits.
      joint_limit_margins: [0.0]

      ## --- Topic names ---
      cartesian_command_in_topic: /moveit_servo_node/delta_twist_cmds   # Twist commands
      joint_topic: /arm_joint_states                                    # Replicated joint states (fix ERROR in MoveIt with non-arm joints)

      ## --- Collision Settings ---
      check_collisions: false
      collision_check_rate: 10.0
      self_collision_proximity_threshold: 0.01
      scene_collision_proximity_threshold: 0.01

      ## --- Scaling Settings ---
      # Scales must stay within achievable joint velocity limits (~1.0 rad/s
      # for base joints). Over-scaling causes Servo to constantly clip → wastes
      # joystick range and creates jerky velocity-limited motion.
      scale:
        linear: 0.5                               # m/s max — achievable with 1 rad/s joint limits
        rotational: 1.0                            # rad/s max for unitless input
        joint: 0.5
